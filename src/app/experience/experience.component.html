<section id="experience" class="section">
  <div class="section-head" appReveal>
    <span class="eyebrow">02 / Experience</span>
    <h2 class="section-title">Where I've <span class="gradient-text">worked</span></h2>
    <p class="section-subtitle">
      Five internships across AI, full-stack product, and data — from early-stage startups
      to research non-profits.
    </p>
  </div>

  <div class="timeline">
    <div class="timeline-item" *ngFor="let job of jobs; let i = index" appReveal [revealDelay]="i * 70">
      <div class="node">
        <span class="node-dot"></span>
      </div>

      <article class="job glass">
        <div class="job-head">
          <div>
            <h3 class="job-role">{{ job.role }}</h3>
            <div class="job-company">{{ job.company }}</div>
          </div>
          <span class="job-period">{{ job.period }}</span>
        </div>

        <p class="job-blurb">{{ job.blurb }}</p>

        <ul class="job-points">
          <li *ngFor="let point of job.points">{{ point }}</li>
        </ul>

        <div class="job-tags">
          <span class="tag" *ngFor="let t of job.tags">{{ t }}</span>
        </div>
      </article>
    </div>
  </div>
</section>
