<section id="projects" class="section">
  <div class="section-head" appReveal>
    <span class="eyebrow">03 / Projects</span>
    <h2 class="section-title">Things I've <span class="gradient-text">built</span></h2>
    <p class="section-subtitle">
      A mix of AI experiments, full-stack apps, and games I made to learn something new.
    </p>
  </div>

  <div class="projects-grid">
    <a
      *ngFor="let p of projects; let i = index"
      class="project glass"
      [class.featured]="p.featured"
      [href]="p.url"
      target="_blank"
      rel="noopener"
      appReveal
      [revealDelay]="i * 80"
    >
      <div class="project-media">
        <img [src]="p.img" [alt]="p.title" loading="lazy" />
        <span class="project-arrow">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M8 7h9v9"/></svg>
        </span>
      </div>
      <div class="project-body">
        <div class="project-top">
          <h3 class="project-title">{{ p.title }}</h3>
          <svg class="gh" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.73.5.5 5.73.5 12a11.5 11.5 0 0 0 7.86 10.93c.58.1.79-.25.79-.56v-2c-3.2.7-3.88-1.37-3.88-1.37-.53-1.34-1.3-1.7-1.3-1.7-1.06-.72.08-.71.08-.71 1.17.08 1.79 1.2 1.79 1.2 1.04 1.79 2.73 1.27 3.4.97.1-.76.41-1.27.74-1.56-2.55-.29-5.23-1.28-5.23-5.7 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.46.11-3.05 0 0 .98-.31 3.2 1.18a11.1 11.1 0 0 1 5.82 0c2.22-1.49 3.2-1.18 3.2-1.18.63 1.59.23 2.76.11 3.05.74.81 1.19 1.84 1.19 3.1 0 4.43-2.69 5.41-5.25 5.69.42.36.8 1.08.8 2.18v3.23c0 .31.21.67.8.56A11.5 11.5 0 0 0 23.5 12C23.5 5.73 18.27.5 12 .5Z"/></svg>
        </div>
        <p class="project-desc">{{ p.description }}</p>
        <div class="project-tags">
          <span class="tag" *ngFor="let t of p.tags">{{ t }}</span>
        </div>
      </div>
    </a>
  </div>
</section>
