<section id="contact" class="section">
  <div class="contact-card glass" appReveal>
    <div class="contact-left">
      <span class="eyebrow">05 / Contact</span>
      <h2 class="section-title">Let's build <span class="gradient-text">something</span></h2>
      <p class="contact-intro">
        Drop a message and I'll get back to you soon.
      </p>

      <div class="contact-links">
        <a
          *ngFor="let link of links"
          [href]="link.href"
          class="contact-link"
          [attr.target]="link.icon === 'mail' ? null : '_blank'"
          rel="noopener"
        >
          <span class="contact-icon" [ngSwitch]="link.icon">
            <svg *ngSwitchCase="'mail'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="m3 6 9 7 9-7"/></svg>
            <svg *ngSwitchCase="'github'" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.73.5.5 5.73.5 12a11.5 11.5 0 0 0 7.86 10.93c.58.1.79-.25.79-.56v-2c-3.2.7-3.88-1.37-3.88-1.37-.53-1.34-1.3-1.7-1.3-1.7-1.06-.72.08-.71.08-.71 1.17.08 1.79 1.2 1.79 1.2 1.04 1.79 2.73 1.27 3.4.97.1-.76.41-1.27.74-1.56-2.55-.29-5.23-1.28-5.23-5.7 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.46.11-3.05 0 0 .98-.31 3.2 1.18a11.1 11.1 0 0 1 5.82 0c2.22-1.49 3.2-1.18 3.2-1.18.63 1.59.23 2.76.11 3.05.74.81 1.19 1.84 1.19 3.1 0 4.43-2.69 5.41-5.25 5.69.42.36.8 1.08.8 2.18v3.23c0 .31.21.67.8.56A11.5 11.5 0 0 0 23.5 12C23.5 5.73 18.27.5 12 .5Z"/></svg>
            <svg *ngSwitchCase="'linkedin'" viewBox="0 0 24 24" fill="currentColor"><path d="M20.45 20.45h-3.55v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.35V9h3.41v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28ZM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12ZM7.12 20.45H3.55V9h3.57v11.45ZM22.22 0H1.77C.8 0 0 .77 0 1.73v20.54C0 23.22.8 24 1.77 24h20.45c.98 0 1.78-.78 1.78-1.73V1.73C24 .77 23.2 0 22.22 0Z"/></svg>
          </span>
          <span class="contact-meta">
            <span class="contact-label">{{ link.label }}</span>
            <span class="contact-value">{{ link.value }}</span>
          </span>
        </a>
      </div>
    </div>

    <form class="contact-form" [action]="formAction" method="POST">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" name="_replyto" placeholder="you@example.com" required />
      </div>
      <div class="field">
        <label for="subject">Subject</label>
        <input id="subject" type="text" name="subject" placeholder="What's this about?" required />
      </div>
      <div class="field">
        <label for="body">Message</label>
        <textarea id="body" name="body" rows="5" placeholder="Tell me a little about it…" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary submit">
        Send message
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2 15 22l-4-9-9-4 20-7Z"/></svg>
      </button>
    </form>
  </div>
</section>
